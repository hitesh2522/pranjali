<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slips Portal</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f6f9;
    }

    header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
    }

    .container {
        padding: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card a {
        text-decoration: none;
        color: #3498db;
        font-weight: bold;
    }

    footer {
        text-align: center;
        padding: 10px;
        background: #2c3e50;
        color: white;
        margin-top: 20px;
    }
</style>

</head>

<body>

<header>
    📘 Slips Portal
</header>

<div class="container">
    <div class="grid">

        <div class="card">
            <h3>Slip 1</h3>
            <a href="#">View</a>
        </div>

        <div class="card">
            <h3>Slip 2</h3>
            <a href="#">View</a>
        </div>

        <div class="card">
            <h3>Slip 3</h3>
            <a href="#">View</a>
        </div>

        <div class="card">
            <h3>Slip 4</h3>
            <a href="#">View</a>
        </div>

        <div class="card">
            <h3>Slip 5</h3>
            <a href="#">View</a>
        </div>

    </div>
</div>

<footer>
    © 2026 Your Name | Slips Website
</footer>

</body>
</html>
